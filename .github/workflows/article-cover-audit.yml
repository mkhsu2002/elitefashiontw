name: Article Cover Audit

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install image dependency
        run: |
          python -m pip install --upgrade pip
          pip install pillow

      - name: Audit article covers
        run: |
          python scripts/article_cover_tools.py strict-audit
