name: Content Cloud Log Backfill

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backfill-google-sheets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Google Sheets dependency
        run: |
          python -m pip install --upgrade pip
          pip install gspread

      - name: Backfill Publish Log To Google Sheets
        env:
          CI_STRICT_GOOGLE_SHEETS: "true"
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON_BASE64 }}
          GOOGLE_SHEETS_WORKSHEET_TITLE: Taiwan
        run: |
          python3 scripts/log_article_to_google_sheets.py --all
