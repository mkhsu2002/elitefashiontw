name: Content Command

on:
  workflow_dispatch:
    inputs:
      instruction:
        description: "自然語言指令，例如：加入主題序列：Dify AI，篇數：6，補充：偏台灣中小企業導入與實作"
        required: true
        type: string
      fixture:
        description: "使用內建 fixture，不呼叫模型 API"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  command:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread pillow

      - name: Resolve Model Provider
        env:
          CONTENT_MODEL_PROVIDER: ${{ vars.CONTENT_MODEL_PROVIDER }}
          OPENAI_CONTENT_MODEL_API_KEY: ${{ secrets.CONTENT_MODEL_API_KEY }}
          NVIDIA_CONTENT_MODEL_API_KEY: ${{ secrets.NVIDIA_CONTENT_MODEL_API_KEY }}
          GEMINI_IMAGE_API_KEY: ${{ secrets.GEMINI_IMAGE_API_KEY || secrets.GEMINI_API_KEY }}
          OPENAI_CONTENT_MODEL: ${{ vars.OPENAI_CONTENT_MODEL }}
          OPENAI_CONTENT_PLANNER_MODEL: ${{ vars.OPENAI_CONTENT_PLANNER_MODEL }}
          NVIDIA_CONTENT_MODEL: ${{ vars.NVIDIA_CONTENT_MODEL }}
          NVIDIA_CONTENT_PLANNER_MODEL: ${{ vars.NVIDIA_CONTENT_PLANNER_MODEL }}
          COVER_IMAGE_PROVIDER: ${{ vars.COVER_IMAGE_PROVIDER }}
          GEMINI_IMAGE_MODEL: ${{ vars.GEMINI_IMAGE_MODEL }}
          COVER_IMAGE_FAILURE_MODE: ${{ vars.COVER_IMAGE_FAILURE_MODE }}
        run: |
          PROVIDER="${CONTENT_MODEL_PROVIDER:-openai}"
          echo "CONTENT_MODEL_PROVIDER=$PROVIDER" >> "$GITHUB_ENV"
          if [ "$PROVIDER" = "nvidia" ]; then
            echo "CONTENT_MODEL_API_KEY=${NVIDIA_CONTENT_MODEL_API_KEY}" >> "$GITHUB_ENV"
            echo "CONTENT_MODEL_ENDPOINT=https://integrate.api.nvidia.com/v1/chat/completions" >> "$GITHUB_ENV"
            echo "CONTENT_MODEL_API_MODE=chat_completions" >> "$GITHUB_ENV"
            echo "CONTENT_MODEL=${NVIDIA_CONTENT_MODEL:-minimaxai/minimax-m2.7}" >> "$GITHUB_ENV"
            echo "CONTENT_PLANNER_MODEL=${NVIDIA_CONTENT_PLANNER_MODEL:-minimaxai/minimax-m2.7}" >> "$GITHUB_ENV"
          else
            echo "CONTENT_MODEL_API_KEY=${OPENAI_CONTENT_MODEL_API_KEY}" >> "$GITHUB_ENV"
            echo "CONTENT_MODEL_ENDPOINT=https://api.openai.com/v1/responses" >> "$GITHUB_ENV"
            echo "CONTENT_MODEL_API_MODE=responses" >> "$GITHUB_ENV"
            echo "CONTENT_MODEL=${OPENAI_CONTENT_MODEL:-gpt-5.4}" >> "$GITHUB_ENV"
            echo "CONTENT_PLANNER_MODEL=${OPENAI_CONTENT_PLANNER_MODEL:-gpt-5.2}" >> "$GITHUB_ENV"
          fi
          echo "COVER_IMAGE_PROVIDER=${COVER_IMAGE_PROVIDER:-gemini}" >> "$GITHUB_ENV"
          echo "GEMINI_IMAGE_API_KEY=${GEMINI_IMAGE_API_KEY}" >> "$GITHUB_ENV"
          echo "GEMINI_IMAGE_MODEL=${GEMINI_IMAGE_MODEL:-imagen-4.0-fast-generate-001}" >> "$GITHUB_ENV"
          echo "COVER_IMAGE_FAILURE_MODE=${COVER_IMAGE_FAILURE_MODE:-fail}" >> "$GITHUB_ENV"

      - name: Run Command
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CONTENT_NOTIFICATION_FROM_EMAIL: ${{ secrets.CONTENT_NOTIFICATION_FROM_EMAIL }}
          CONTENT_NOTIFICATION_TO_EMAIL: ${{ secrets.CONTENT_NOTIFICATION_TO_EMAIL }}
        run: |
          if [ "${{ inputs.fixture }}" = "true" ]; then
            python3 scripts/content_pipeline.py command --instruction "${{ inputs.instruction }}" --fixture
          else
            python3 scripts/content_pipeline.py command --instruction "${{ inputs.instruction }}"
          fi

      - name: Check Changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit Changes
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: content pipeline command"

      - name: Push Changes
        if: steps.diff.outputs.has_changes == 'true'
        run: git push origin HEAD:main

      - name: Check Latest Run Status
        if: steps.diff.outputs.has_changes == 'true'
        id: latest
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path("automation/latest-run.json").read_text())
          status = payload.get("status", "")
          with open(Path.cwd() / Path(".latest-status"), "w", encoding="utf-8") as handle:
              handle.write(status)
          print(status)
          PY
          echo "status=$(cat .latest-status)" >> "$GITHUB_OUTPUT"

      - name: Wait For Production
        if: steps.diff.outputs.has_changes == 'true' && steps.latest.outputs.status == 'generated'
        run: |
          python3 scripts/content_pipeline.py wait-for-live --timeout-seconds 1800

      - name: Send Notification
        if: steps.diff.outputs.has_changes == 'true' && steps.latest.outputs.status == 'generated'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CONTENT_NOTIFICATION_FROM_EMAIL: ${{ secrets.CONTENT_NOTIFICATION_FROM_EMAIL }}
          CONTENT_NOTIFICATION_TO_EMAIL: ${{ secrets.CONTENT_NOTIFICATION_TO_EMAIL }}
        run: |
          python3 scripts/content_pipeline.py send-notification

      - name: Log Published Article To Google Sheets
        if: steps.diff.outputs.has_changes == 'true' && steps.latest.outputs.status == 'generated'
        env:
          CI_STRICT_GOOGLE_SHEETS: "true"
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON_BASE64 }}
          GOOGLE_SHEETS_WORKSHEET_TITLE: Taiwan
        run: |
          python3 scripts/log_article_to_google_sheets.py --all-site-articles

      - name: Send Newsletter Broadcast
        if: steps.diff.outputs.has_changes == 'true' && steps.latest.outputs.status == 'generated'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_FROM_EMAIL: ${{ secrets.NEWSLETTER_FROM_EMAIL }}
          CONTENT_NOTIFICATION_FROM_EMAIL: ${{ secrets.CONTENT_NOTIFICATION_FROM_EMAIL }}
          RESEND_NEWSLETTER_SEGMENT_ID: ${{ secrets.RESEND_NEWSLETTER_SEGMENT_ID }}
          RESEND_NEWSLETTER_SEGMENT_NAME: ${{ vars.RESEND_NEWSLETTER_SEGMENT_NAME }}
        run: |
          python3 scripts/content_pipeline.py send-newsletter
