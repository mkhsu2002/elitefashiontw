<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YGMJG52MQH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-YGMJG52MQH');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>站內搜尋 | Elite Fashion</title>
    <meta name="description" content="搜尋 Elite Fashion 站內文章、FAQ 與系列主題。">
    <link rel="canonical" href="https://tw.elitefasion.com/search.html">
    <link rel="stylesheet" href="css/styles.css?v=1.3">
    <link rel="icon" type="image/svg+xml" href="images/favicon/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .search-shell {
            max-width: 1040px;
            margin: 0 auto;
            padding: clamp(5rem, 9vw, 7rem) 20px 5rem;
        }
        .search-shell h1 {
            font-family: var(--font-serif);
            font-size: clamp(2.6rem, 6vw, 4.7rem);
            line-height: 1.08;
            margin-bottom: 1rem;
        }
        .search-shell > p {
            max-width: 680px;
            color: var(--text-light);
            font-size: 1.08rem;
            line-height: 1.8;
            margin-bottom: 2rem;
        }
        .search-input {
            width: 100%;
            min-height: 58px;
            padding: 16px 18px;
            border: 1px solid rgba(17, 17, 17, 0.14);
            border-radius: 4px;
            font-size: 1.05rem;
            box-shadow: 0 14px 34px rgba(17, 17, 17, 0.06);
        }
        .search-input:focus {
            outline: 2px solid rgba(167, 134, 69, 0.35);
            border-color: #a78645;
        }
        .search-results {
            margin-top: 2rem;
            display: grid;
            gap: 1.1rem;
        }
        .search-card {
            padding: 1.45rem;
            border: 1px solid rgba(17, 17, 17, 0.08);
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 1px 0 rgba(17, 17, 17, 0.04);
            transition: all 0.28s ease;
        }
        .search-card:hover {
            transform: translateY(-4px);
            border-color: rgba(167, 134, 69, 0.6);
            box-shadow: 0 18px 42px rgba(17, 17, 17, 0.08);
        }
        .search-card a {
            color: #111;
            text-decoration: none;
        }
        .search-card h2 {
            font-family: var(--font-serif);
            font-size: clamp(1.35rem, 3vw, 1.8rem);
            line-height: 1.28;
            margin-bottom: 0.55rem;
        }
        .search-card p {
            color: var(--text-light);
            margin: 0;
        }
        .search-meta {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 0.25rem 0.6rem;
            border: 1px solid rgba(17, 17, 17, 0.08);
            background: var(--surface-sage);
            color: var(--secondary-color);
            font-size: 0.84rem;
            margin-bottom: 0.5rem;
        }
        .search-empty {
            color: #666;
        }
    </style>
</head>
<body>
    <nav class="navbar" role="navigation" aria-label="主導覽列">
        <div class="container">
            <div class="nav-brand"><a href="index.html" class="logo"><img src="images/logo.jpg" alt="Elite Fashion Logo"></a></div>
            <button class="mobile-menu-toggle" aria-label="開啟選單" aria-expanded="false"><span></span><span></span><span></span></button>
            <ul class="nav-menu">
                <li><a href="index.html">首頁</a></li>
                <li><a href="all-articles.html">文章列表</a></li>
                <li><a href="search.html" class="active">搜尋</a></li>
                <li><a href="contact.html">聯絡我們</a></li>
            </ul>
        </div>
    </nav>

    <main class="search-shell">
        <h1>站內搜尋</h1>
        <p>搜尋文章標題、摘要、FAQ 與標籤。</p>
        <input id="search-input" class="search-input" type="search" placeholder="例如：Dify、客服、熟齡穿搭、AI 代理人">
        <div id="search-results" class="search-results"></div>
    </main>

    <script>
        const input = document.getElementById('search-input');
        const results = document.getElementById('search-results');

        function escapeHtml(value) {
            return value
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;');
        }

        function render(items, query) {
            if (!query) {
                results.innerHTML = '<p class="search-empty">輸入關鍵字後會在這裡顯示結果。</p>';
                return;
            }
            if (!items.length) {
                results.innerHTML = '<p class="search-empty">找不到符合結果，請換個關鍵字試試看。</p>';
                return;
            }
            results.innerHTML = items.map((item) => `
                <article class="search-card">
                    <a href="${item.relativeUrl}">
                        <div class="search-meta">${escapeHtml(item.categoryLabel)} · ${escapeHtml(item.publishedDateText || '')}</div>
                        <h2>${escapeHtml(item.title)}</h2>
                        <p>${escapeHtml(item.excerpt)}</p>
                    </a>
                </article>
            `).join('');
        }

        async function load() {
            const response = await fetch('data/search-index.json', { cache: 'no-store' });
            const items = await response.json();
            const params = new URLSearchParams(window.location.search);
            const initialQuery = params.get('q') || '';
            input.value = initialQuery;
            const apply = () => {
                const query = input.value.trim().toLowerCase();
                const filtered = items.filter((item) => {
                    const haystack = [item.title, item.excerpt, ...(item.tags || []), ...(item.faqQuestions || [])]
                        .join(' ')
                        .toLowerCase();
                    return haystack.includes(query);
                });
                render(filtered.slice(0, 50), query);
            };
            input.addEventListener('input', apply);
            apply();
        }

        load().catch(() => {
            results.innerHTML = '<p class="search-empty">搜尋索引載入失敗。</p>';
        });
    </script>
    <script src="js/main.js"></script>
</body>
</html>
